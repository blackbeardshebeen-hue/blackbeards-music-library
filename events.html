<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bay Area Events — Blackbeard's Little Music Library</title>
    <link rel="stylesheet" href="assets/theme.css">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon.png">
    <link rel="apple-touch-icon" href="assets/favicon-64.png">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Blackbeard's Little Music Library">
    <meta property="og:title" content="Bay Area Events — Blackbeard's Little Music Library">
    <meta property="og:description" content="Bay Area shows worth leaving the house for.">
    <meta property="og:url" content="https://blackbeards-music-library.pages.dev/events.html">
    <meta property="og:image" content="https://blackbeards-music-library.pages.dev/assets/og-image.png">
    <style>
        .events-header{text-align:center;padding:48px 0 28px}
        .events-header h1{font-size:2.2em;margin-bottom:8px}
        .events-header .subtitle{margin-bottom:6px}
        .events-header .tagline{color:rgba(255,255,255,.5);font-size:.9em}
        html.day .events-header .tagline{color:rgba(0,0,0,.45)}
        .filters-wrap{max-width:720px;margin:0 auto 36px;padding:0 8px}
        .search-wrap{position:relative;margin-bottom:18px}
        .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:.95em;opacity:.4;pointer-events:none}
        .events-search{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 16px 12px 40px;color:#fff;font-size:.9em;font-family:inherit;outline:none;transition:border-color .2s,background .2s;box-sizing:border-box}
        .events-search::placeholder{color:rgba(255,255,255,.3)}
        .events-search:focus{border-color:rgba(196,24,42,.5);background:rgba(255,255,255,.09)}
        html.day .events-search{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.12);color:#111}
        html.day .events-search::placeholder{color:rgba(0,0,0,.3)}
        html.day .events-search:focus{border-color:rgba(196,24,42,.4);background:rgba(0,0,0,.07)}
        .filter-row{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:10px}
        .filter-label{font-size:.65em;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.3);white-space:nowrap;min-width:54px}
        html.day .filter-label{color:rgba(0,0,0,.3)}
        .filter-pills{display:flex;flex-wrap:wrap;gap:6px}
        .pill{font-size:.72em;padding:5px 12px;border-radius:100px;border:1px solid rgba(255,255,255,.12);background:transparent;color:rgba(255,255,255,.5);cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit}
        .pill:hover{border-color:rgba(255,255,255,.25);color:rgba(255,255,255,.8)}
        .pill.active{background:var(--red-bright);border-color:var(--red-bright);color:#fff}
        html.day .pill{border-color:rgba(0,0,0,.15);color:rgba(0,0,0,.45)}
        html.day .pill:hover{border-color:rgba(0,0,0,.3);color:rgba(0,0,0,.7)}
        html.day .pill.active{background:var(--red-bright);border-color:var(--red-bright);color:#fff}
        .results-meta{display:flex;align-items:center;justify-content:space-between;max-width:720px;margin:0 auto 20px;padding:0 8px;font-size:.75em;color:rgba(255,255,255,.35)}
        html.day .results-meta{color:rgba(0,0,0,.35)}
        .clear-btn{font-size:.85em;color:var(--red-bright);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;font-family:inherit;display:none;transition:background .15s}
        .clear-btn:hover{background:rgba(196,24,42,.12)}
        .clear-btn.visible{display:inline}
        .geo-section{margin-bottom:44px}
        .geo-header{display:flex;align-items:center;gap:10px;max-width:720px;margin:0 auto 16px;padding:0 8px}
        .geo-title{font-family:'Pirata One',serif;font-size:1.3em;color:#fff;letter-spacing:.5px}
        html.day .geo-title{color:#111}
        .geo-count{font-size:.7em;color:rgba(255,255,255,.3);background:rgba(255,255,255,.06);border-radius:100px;padding:2px 9px}
        html.day .geo-count{color:rgba(0,0,0,.35);background:rgba(0,0,0,.05)}
        .geo-line{flex:1;height:1px;background:rgba(255,255,255,.07)}
        html.day .geo-line{background:rgba(0,0,0,.08)}
        .events-list{display:flex;flex-direction:column;gap:12px;max-width:720px;margin:0 auto;padding:0 8px}
        .event-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:20px 22px;display:grid;grid-template-columns:58px 1fr auto;gap:0 16px;align-items:start;transition:background .2s,border-color .2s,transform .2s}
        .event-card:hover{background:rgba(255,255,255,.07);border-color:rgba(196,24,42,.3);transform:translateY(-1px)}
        html.day .event-card{background:rgba(0,0,0,.03);border-color:rgba(0,0,0,.08)}
        html.day .event-card:hover{background:rgba(196,24,42,.05);border-color:rgba(196,24,42,.25)}
        .event-date-block{display:flex;flex-direction:column;align-items:center;text-align:center;padding-top:2px}
        .event-month{font-size:.58em;text-transform:uppercase;letter-spacing:2px;color:var(--red-bright);font-weight:700;line-height:1;margin-bottom:1px}
        .event-day{font-family:'Pirata One',serif;font-size:2em;line-height:1;color:#fff;margin-bottom:1px}
        html.day .event-day{color:#111}
        .event-weekday{font-size:.55em;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.35)}
        html.day .event-weekday{color:rgba(0,0,0,.35)}
        .event-info{min-width:0}
        .event-title{font-family:'Pirata One',serif;font-size:1.15em;color:#fff;line-height:1.2;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        html.day .event-title{color:#111}
        .event-meta{font-size:.74em;color:rgba(255,255,255,.4);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        html.day .event-meta{color:rgba(0,0,0,.4)}
        .event-desc{font-size:.8em;color:rgba(255,255,255,.55);line-height:1.55}
        html.day .event-desc{color:rgba(0,0,0,.5)}
        .event-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;padding-top:2px;flex-shrink:0}
        .event-badge{font-size:.62em;text-transform:uppercase;letter-spacing:1.2px;background:rgba(196,24,42,.15);color:var(--red-bright);border:1px solid rgba(196,24,42,.28);border-radius:100px;padding:3px 9px;white-space:nowrap}
        .event-link-btn{font-size:.72em;color:rgba(255,255,255,.4);text-decoration:none;border-bottom:1px solid rgba(255,255,255,.15);padding-bottom:1px;transition:color .15s,border-color .15s;white-space:nowrap}
        .event-link-btn:hover{color:#fff;border-color:#fff}
        html.day .event-link-btn{color:rgba(0,0,0,.4);border-color:rgba(0,0,0,.18)}
        html.day .event-link-btn:hover{color:#111;border-color:#111}
        .event-card.past{opacity:.38}
        .events-empty{text-align:center;padding:60px 20px;color:rgba(255,255,255,.3);max-width:720px;margin:0 auto}
        html.day .events-empty{color:rgba(0,0,0,.3)}
        .events-empty .skull{font-size:2.8em;display:block;margin-bottom:14px}
        .events-empty p{font-size:.9em;line-height:1.7}
        .events-loading{text-align:center;padding:60px 20px;color:rgba(255,255,255,.25);font-size:.9em}
        .events-edit-hint{text-align:center;font-size:.68em;color:rgba(255,255,255,.18);margin:20px 0 60px;letter-spacing:.5px}
        html.day .events-edit-hint{color:rgba(0,0,0,.18)}
        .events-back{text-align:center;margin-bottom:60px}
        @media(max-width:560px){
            .event-card{grid-template-columns:48px 1fr;grid-template-rows:auto auto;gap:0 12px;padding:16px 14px}
            .event-right{grid-column:2;flex-direction:row;align-items:center;flex-wrap:wrap;gap:6px;margin-top:8px}
            .event-day{font-size:1.7em}
            .event-title{font-size:1em}
            .filter-label{display:none}
        }
    </style>
</head>
<body>
    <div class="flag-bg" aria-hidden="true">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/04/Pirate_Flag_of_Blackbeard_%28Edward_Teach%29.svg" alt="">
    </div>
    <button id="theme-toggle-btn" class="theme-toggle" title="Toggle day/night" aria-label="Toggle day and night theme">Day</button>
    <div class="container wide">
        <div class="events-header">
            <h1>Blackbeard's Little Music Library</h1>
            <p class="subtitle">Bay Area Events</p>
            <p class="tagline">Shows worth leaving the house for.</p>
        </div>
        <div class="filters-wrap">
            <div class="search-wrap">
                <span class="search-icon">&#128269;</span>
                <input type="text" class="events-search" id="events-search" placeholder="Search shows, venues, artists…" autocomplete="off" spellcheck="false">
            </div>
            <div class="filter-row">
                <span class="filter-label">Where</span>
                <div class="filter-pills" id="city-pills"></div>
            </div>
            <div class="filter-row">
                <span class="filter-label">Genre</span>
                <div class="filter-pills" id="genre-pills"></div>
            </div>
            <div class="filter-row">
                <span class="filter-label">When</span>
                <div class="filter-pills" id="when-pills">
                    <button class="pill active" data-when="all">All</button>
                    <button class="pill" data-when="week">This Week</button>
                    <button class="pill" data-when="month">This Month</button>
                    <button class="pill" data-when="july">July</button>
                    <button class="pill" data-when="august">August</button>
                </div>
            </div>
        </div>
        <div class="results-meta">
            <span id="results-count"></span>
            <button class="clear-btn" id="clear-btn">Clear filters &times;</button>
        </div>
        <div id="events-root"><div class="events-loading">Loading shows…</div></div>
        <p class="events-edit-hint">&#9875; Events managed via events.json in the GitHub repo</p>
        <div class="events-back page-actions">
            <a href="index.html" class="back-btn">&larr; Back to the Library</a>
        </div>
        <div class="footer"><p>Share the music, share the joy.</p></div>
    </div>
    <script src="assets/site.js"></script>
    <script src="assets/events.js"></script>
    <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token":"cf8e8fdf48e04f3580098a99d7e1c1ec"}'></script>
</body>
</html>
